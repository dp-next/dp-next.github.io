<ul class="list-unstyled">
<% for (const item of items) { %>
  <li>
    <strong><%- item.title %></strong>
    <% if (item.authors) { %> – <%- item.authors %><% } %>
    <% if (item.host) { %>Host: <%- item.host %><% } %>
    <% if (item.year) { %> (<%- item.year %>)<% } %>
    <% if (item.link) { %>
      (<a href="<%- item.link %>"><%= item.link %></a>)
    <% } %>
  </li>
<% } %>
</ul>

<ul class="list-unstyled">
<% for (const item of items) { %>
  <li>
    <strong><%- item.title %></strong>
    <% if (item.authors) { %> – <%- item.authors %><% } %>
    <% if (item.year) { %> (<%- item.year %>)<% } %>
    <% if (item.link) { %>
      – <a href="<%- item.link %>">link</a>
    <% } %>
    <% if (item.description) { %>
      <div><%- item.description %></div>
    <% } %>
  </li>
<% } %>
</ul>
